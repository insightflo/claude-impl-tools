# Contract-First Template for Hybrid Wave Architecture
#
# Phase 0에서 생성되는 계약 파일 템플릿
# 모든 도메인 에이전트가 이 계약을 준수해야 병렬 실행 가능
#
---

# 1. API Contract (OpenAPI 스타일)
api_contract:
  version: "1.0.0"

  # 공통 응답 형식
  response_format:
    success:
      schema: |
        {
          "success": true,
          "data": T,
          "meta": { "timestamp": "ISO8601" }
        }
    error:
      schema: |
        {
          "success": false,
          "error": {
            "code": "ERROR_CODE",
            "message": "Human readable message",
            "details": {}
          }
        }

  # 공통 에러 코드
  error_codes:
    - VALIDATION_ERROR
    - NOT_FOUND
    - UNAUTHORIZED
    - FORBIDDEN
    - INTERNAL_ERROR

  # 엔드포인트 네이밍 규칙
  naming:
    pattern: "/api/v1/{domain}/{resource}"
    methods: [GET, POST, PUT, PATCH, DELETE]
    examples:
      - GET /api/v1/users
      - POST /api/v1/users
      - GET /api/v1/users/{id}
      - PUT /api/v1/users/{id}
      - DELETE /api/v1/users/{id}

---

# 2. Type Contract (공유 타입 정의)
type_contract:
  # 공통 기본 타입
  base_types:
    ID: "string (UUID v4)"
    Timestamp: "string (ISO8601)"
    Email: "string (RFC5322)"
    Money: "{ amount: number, currency: string }"

  # 도메인별 엔티티 (Phase 0에서 정의)
  entities:
    User:
      id: ID
      email: Email
      name: string
      createdAt: Timestamp
      updatedAt: Timestamp

    # 다른 엔티티들은 Phase 0에서 추가
    # Product: ...
    # Order: ...

---

# 3. Design Token Contract (UI 일관성)
design_contract:
  # 색상 토큰
  colors:
    primary: "#3B82F6"
    secondary: "#6B7280"
    success: "#10B981"
    warning: "#F59E0B"
    error: "#EF4444"
    background: "#FFFFFF"
    surface: "#F3F4F6"
    text:
      primary: "#111827"
      secondary: "#6B7280"

  # 간격 토큰
  spacing:
    xs: "4px"
    sm: "8px"
    md: "16px"
    lg: "24px"
    xl: "32px"

  # 타이포그래피
  typography:
    fontFamily: "Inter, system-ui, sans-serif"
    sizes:
      xs: "12px"
      sm: "14px"
      md: "16px"
      lg: "18px"
      xl: "24px"
      "2xl": "32px"

---

# 4. Domain Boundary Contract (도메인 간 통신 규칙)
domain_contract:
  # 도메인 목록
  domains:
    - name: user
      owner: backend-specialist
      public_apis:
        - GET /api/v1/users/{id}
        - GET /api/v1/users/me

    - name: product
      owner: backend-specialist
      public_apis:
        - GET /api/v1/products
        - GET /api/v1/products/{id}

    # 다른 도메인들 Phase 0에서 추가

  # 도메인 간 의존성 규칙
  dependency_rules:
    - "user → (none)"  # user는 다른 도메인에 의존하지 않음
    - "product → user"  # product는 user 조회 가능
    - "order → user, product"  # order는 user, product 조회 가능

  # 금지된 의존성 (순환 방지)
  forbidden:
    - "user → product"
    - "user → order"

---

# 5. Test Contract (테스트 표준)
test_contract:
  # 테스트 파일 위치
  structure:
    unit: "src/{domain}/__tests__/*.test.ts"
    integration: "tests/integration/{domain}.test.ts"
    e2e: "tests/e2e/*.spec.ts"

  # 커버리지 기준
  coverage:
    minimum:
      statements: 80
      branches: 70
      functions: 80
      lines: 80

  # 테스트 네이밍
  naming:
    pattern: "describe('ClassName', () => { it('should verb when condition', ...) })"

---

# 6. Wave Validation Checkpoints
wave_validation:
  # Wave 중간 검증
  mid_wave:
    - contract_compliance: "모든 API가 api_contract 준수"
    - type_consistency: "공유 타입 사용 확인"
    - no_duplicates: "유틸 함수 중복 없음"

  # Wave 종료 검증
  end_wave:
    - cross_domain_review: "다른 도메인 에이전트가 코드 검토"
    - integration_test: "도메인 간 통합 테스트 통과"
    - design_consistency: "디자인 토큰 준수"

  # 최종 검증
  final:
    - full_test_suite: "전체 테스트 통과"
    - security_scan: "보안 스캔 통과"
    - quality_audit: "/quality-auditor 통과"

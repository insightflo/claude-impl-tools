title: Task Metadata Format
description: Extended TASKS.md reference for orchestrate-standalone.
basic_task: "- [ ] T1.1: Task description"
task_with_metadata:
  task: "- [ ] T1.1: Task description"
  metadata:
    deps: [T1.0, T0.5]
    domain: backend
    risk: medium
    files:
      - src/domains/user/*
    owner: backend-specialist
    model: codex
fields:
  deps: Dependency task IDs
  domain: backend | frontend | shared
  risk: low | medium | high | critical
  files: File patterns used for conflict detection
  owner: Responsible agent
  model: Optional explicit override for executor/model routing
notes:
  - Omit model when owner or model-routing.yaml should decide the executor.
  - Add model only when a task must be pinned to a specific executor.
examples:
  sequential:
    - task: "- [ ] T1.1: Design database schema"
      metadata:
        deps: []
        domain: backend
    - task: "- [ ] T1.2: Create migration"
      metadata:
        deps: [T1.1]
        domain: backend
    - task: "- [ ] T1.3: Run migration"
      metadata:
        deps: [T1.2]
        domain: backend
        risk: critical
  parallel:
    - task: "- [ ] T1.1: User API design"
      metadata:
        deps: []
        domain: backend
    - task: "- [ ] T1.2: Product API design"
      metadata:
        deps: []
        domain: backend
  complete_fragment:
    - task: "- [ ] T1.1: User API design"
      metadata:
        deps: []
        domain: backend
        risk: low
        owner: backend-specialist
    - task: "- [ ] T1.2: User list component"
      metadata:
        deps: [T1.1]
        domain: frontend
        risk: low
        files:
          - src/screens/UserList.tsx
        owner: frontend-specialist
    - task: "- [ ] T1.3: Pixel-perfect landing page polish"
      metadata:
        deps: [T1.2]
        domain: frontend
        owner: frontend-specialist
        model: gemini

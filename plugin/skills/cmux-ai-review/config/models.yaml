# cmux-ai-review 모델 설정
# 프로젝트별 오버라이드: .claude/cmux-ai-models.yaml

models:
  codex:
    command: "codex --dangerously-bypass-approvals-and-sandbox"
    model: "gpt-5.4"
    effort: "high"
    submit: "cmux send-key Return"
    signal: "review-codex-{stage}"

  gemini:
    command: "gemini -y -m gemini-3-flash-preview"
    model: "gemini-3-flash-preview"
    submit: "cmux send-key Return"
    signal: "review-gemini-{stage}"
    note: "API 400/429 빈번, 불안정 시 codex로 대체"

  claude:
    command: "claude --dangerously-skip-permissions"
    model: "opus"

# 도메인별 패널 역할
panel_roles:
  code-review:
    gemini: "architecture, UX, readability"
    codex:  "technical correctness, security, performance"
  market-regime:
    gemini: "macro trends, news sentiment"
    codex:  "quantitative indicators, historical patterns"
  investment:
    gemini: "market positioning, strategy"
    codex:  "financials, risk metrics"
  risk-assessment:
    gemini: "external threats, business impact"
    codex:  "internal weaknesses, technical risks"
  default:
    gemini: "strategic opportunities, big picture"
    codex:  "execution risks, concrete issues"

# Score Card 가중치 (code-review 기준)
weights:
  security: 25
  performance: 20
  maintainability: 25
  correctness: 20
  style: 10

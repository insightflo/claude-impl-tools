# cmux-ai-run 모델 설정
# 프로젝트별 오버라이드: .claude/cmux-ai-models.yaml

models:
  codex:
    command: "codex --dangerously-bypass-approvals-and-sandbox"
    model: "gpt-5.4"
    effort: "high"
    submit: "cmux send-key Return"  # Enter 1번으로는 안 될 수 있음, send-key 명시
    signal: "{task}-done"           # cmux wait-for 시그널

  gemini:
    command: "gemini -y -m gemini-3-flash-preview"
    model: "gemini-3-flash-preview"
    submit: "cmux send-key Return"
    signal: "{task}-done"
    note: "API 400/429 빈번, 불안정 시 codex로 대체"

  claude:
    command: "claude --dangerously-skip-permissions"
    model: "opus"

# 역할별 기본 AI 배정
routing:
  code_generation: codex
  code_review: codex
  refactoring: codex
  test_writing: codex
  design_implementation: gemini
  ui_components: gemini
  design_review: gemini
  architecture: claude
  planning: claude
  orchestration: claude
